<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Ponto Eletrônico - Rafael Carvalho</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --accent2:#22c55e;
    --danger:#ef4444; --warn:#f59e0b; --text:#e2e8f0; --muted:#94a3b8;
  }
  *{box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  body{margin:0;background:var(--bg);color:var(--text);padding:20px;min-height:100vh}
  h1{margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
  .card{background:var(--card);border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .clock{font-size:42px;font-weight:700;text-align:center;color:var(--accent);letter-spacing:2px}
  .date{text-align:center;color:var(--muted);margin-bottom:16px}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  button{cursor:pointer;border:none;border-radius:8px;padding:12px 18px;font-weight:600;font-size:14px;transition:transform .1s,opacity .2s}
  button:hover{transform:translateY(-2px)}
  button:active{transform:translateY(0)}
  .btn-primary{background:var(--accent);color:#0f172a}
  .btn-success{background:var(--accent2);color:#0f172a}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-warn{background:var(--warn);color:#0f172a}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid #334155}
  .day-block{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:12px}
  .day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
  .day-date{font-weight:700;color:var(--accent)}
  .day-total{background:var(--accent2);color:#0f172a;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:700}
  .day-total.open{background:var(--warn)}
  .punch{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed #334155;font-size:14px}
  .punch:last-child{border-bottom:none}
  .punch-type{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:8px}
  .type-entrada{background:#22c55e33;color:#22c55e}
  .type-saida{background:#ef444433;color:#ef4444}
  .punch-actions{display:flex;gap:6px}
  .icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px}
  .icon-btn:hover{color:var(--danger)}
  .empty{text-align:center;color:var(--muted);padding:30px}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--accent2);color:#0f172a;padding:12px 20px;border-radius:8px;font-weight:600;opacity:0;transform:translateY(20px);transition:all .3s;z-index:1000}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.error{background:var(--danger);color:#fff}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-overlay.show{display:flex}
  .modal{background:var(--card);border-radius:14px;padding:24px;max-width:400px;width:100%}
  .modal h3{margin:0 0 16px;color:var(--accent)}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;margin-bottom:6px;color:var(--muted);font-size:13px}
  .form-group input,.form-group select{width:100%;padding:10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:var(--text);font-size:14px}
  .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .status-bar{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:10px}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent2);margin-right:4px}
  .status-dot.offline{background:var(--danger)}
</style>
</head>
<body>

<h1>⏱️ Ponto Eletrônico</h1>
<div class="sub">Rafael Carvalho</div>

<div class="card">
  <div class="clock" id="clock">--:--:--</div>
  <div class="date" id="today">--</div>
  <div class="btn-row">
    <button class="btn-success" onclick="registrarPonto('entrada')">🟢 Entrada</button>
    <button class="btn-danger" onclick="registrarPonto('saida')">🔴 Saída</button>
    <button class="btn-warn" onclick="abrirModal()">✏️ Inserção Manual</button>
    <button class="btn-primary" onclick="exportarPDF()">📄 Exportar PDF</button>
  </div>
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">Conectado</span></span>
    <span id="regCount">0 registros</span>
  </div>
</div>

<div class="card">
  <h3 style="margin:0 0 14px;color:var(--accent)">📋 Histórico</h3>
  <div id="historico"><div class="empty">Carregando...</div></div>
</div>

<!-- Modal Inserção Manual -->
<div class="modal-overlay" id="modalManual">
  <div class="modal">
    <h3>✏️ Inserção Manual</h3>
    <div class="form-group">
      <label>Data</label>
      <input type="date" id="manualData"/>
    </div>
    <div class="form-group">
      <label>Hora</label>
      <input type="time" id="manualHora" step="1"/>
    </div>
    <div class="form-group">
      <label>Tipo</label>
      <select id="manualTipo">
        <option value="entrada">🟢 Entrada</option>
        <option value="saida">🔴 Saída</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn-success" onclick="salvarManual()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDcqSPsYRbLOG--o1QxytP4HXBq9yBO8Jc",
    authDomain: "pontoeletronicorafael.firebaseapp.com",
    projectId: "pontoeletronicorafael",
    storageBucket: "pontoeletronicorafael.appspot.com",
    messagingSenderId: "000000000000",
    appId: "1:000000000000:web:0000000000000000000000"
  };
  const NOME_COLECAO = "pontos";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.fb = { db, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, NOME_COLECAO };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<!-- html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let registros = [];
let firebaseReady = false;

window.addEventListener('firebase-ready', async () => {
  firebaseReady = true;
  atualizarStatus(true);
  await carregarDoFirebase();
});

// Se firebase demorar / falhar, carrega local
setTimeout(() => {
  if (!firebaseReady) {
    atualizarStatus(false);
    carregarLocal();
  }
}, 3000);

function atualizarStatus(online) {
  document.getElementById('statusDot').classList.toggle('offline', !online);
  document.getElementById('statusText').textContent = online ? 'Conectado ao Firebase' : 'Offline (localStorage)';
}

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// Relógio
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR');
  document.getElementById('today').textContent = now.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
}
setInterval(tickClock, 1000); tickClock();

// ========== CARREGAMENTO ==========
async function carregarDoFirebase() {
  try {
    const q = window.fb.query(
      window.fb.collection(window.fb.db, window.fb.NOME_COLECAO),
      window.fb.orderBy('timestamp', 'desc')
    );
    const snap = await window.fb.getDocs(q);
    registros = [];
    snap.forEach(d => registros.push({ id: d.id, ...d.data() }));
    localStorage.setItem('pontos', JSON.stringify(registros));
    renderHistorico();
  } catch (e) {
    console.error('Erro Firebase:', e);
    atualizarStatus(false);
    carregarLocal();
    toast('Erro ao carregar do Firebase, usando cache local', true);
  }
}

function carregarLocal() {
  registros = JSON.parse(localStorage.getItem('pontos') || '[]');
  renderHistorico();
}

// ========== REGISTRO ==========
async function registrarPonto(tipo) {
  const agora = new Date();
  await salvarRegistro({
    tipo,
    timestamp: agora.getTime(),
    data: agora.toLocaleDateString('pt-BR'),
    hora: agora.toLocaleTimeString('pt-BR'),
    manual: false
  });
  toast(`✅ ${tipo === 'entrada' ? 'Entrada' : 'Saída'} registrada`);
}

window.registrarPonto = registrarPonto;

async function salvarRegistro(reg) {
  if (firebaseReady) {
    try {
      const ref = await window.fb.addDoc(
        window.fb.collection(window.fb.db, window.fb.NOME_COLECAO),
        reg
      );
      reg.id = ref.id;
    } catch (e) {
      console.error('Erro ao salvar Firebase:', e);
      toast('Salvo local, Firebase falhou', true);
    }
  }
  registros.unshift(reg);
  registros.sort((a,b) => b.timestamp - a.timestamp);
  localStorage.setItem('pontos', JSON.stringify(registros));
  renderHistorico();
}

// ========== INSERÇÃO MANUAL ==========
function abrirModal() {
  const hoje = new Date();
  document.getElementById('manualData').value = hoje.toISOString().slice(0,10);
  document.getElementById('manualHora').value = hoje.toTimeString().slice(0,8);
  document.getElementById('modalManual').classList.add('show');
}
function fecharModal() {
  document.getElementById('modalManual').classList.remove('show');
}
window.abrirModal = abrirModal;
window.fecharModal = fecharModal;

async function salvarManual() {
  const data = document.getElementById('manualData').value;
  const hora = document.getElementById('manualHora').value;
  const tipo = document.getElementById('manualTipo').value;

  if (!data || !hora) { toast('Preencha data e hora', true); return; }

  const [ano,mes,dia] = data.split('-');
  const [h,m,s='00'] = hora.split(':');
  const dt = new Date(+ano, +mes-1, +dia, +h, +m, +s);

  await salvarRegistro({
    tipo,
    timestamp: dt.getTime(),
    data: dt.toLocaleDateString('pt-BR'),
    hora: dt.toLocaleTimeString('pt-BR'),
    manual: true
  });
  fecharModal();
  toast('✏️ Registro manual salvo');
}
window.salvarManual = salvarManual;

// ========== EXCLUSÃO ==========
async function excluirRegistro(id, timestamp) {
  if (!confirm('Excluir este registro?')) return;
  if (firebaseReady && id) {
    try {
      await window.fb.deleteDoc(window.fb.doc(window.fb.db, window.fb.NOME_COLECAO, id));
    } catch(e) { console.error(e); toast('Erro ao excluir do Firebase', true); }
  }
  registros = registros.filter(r => (r.id && r.id !== id) && r.timestamp !== timestamp);
  registros = registros.filter(r => !(r.id === id || r.timestamp === timestamp));
  localStorage.setItem('pontos', JSON.stringify(registros));
  renderHistorico();
  toast('🗑️ Registro excluído');
}
window.excluirRegistro = excluirRegistro;

// ========== HISTÓRICO COM CÁLCULO ==========
function renderHistorico() {
  document.getElementById('regCount').textContent = `${registros.length} registro(s)`;
  const container = document.getElementById('historico');
  if (registros.length === 0) {
    container.innerHTML = '<div class="empty">Nenhum registro ainda.</div>';
    return;
  }

  // agrupa por data
  const grupos = {};
  registros.forEach(r => {
    if (!grupos[r.data]) grupos[r.data] = [];
    grupos[r.data].push(r);
  });

  // ordena datas desc
  const datasOrdenadas = Object.keys(grupos).sort((a,b) => {
    const [da,ma,ya] = a.split('/'); const [db,mb,yb] = b.split('/');
    return new Date(yb,mb-1,db) - new Date(ya,ma-1,da);
  });

  let html = '';
  datasOrdenadas.forEach(data => {
    const lista = grupos[data].slice().sort((a,b) => a.timestamp - b.timestamp);
    const { totalMs, aberto } = calcularHoras(lista);
    const totalStr = formatarDuracao(totalMs);

    html += `<div class="day-block">
      <div class="day-header">
        <span class="day-date">📅 ${data}</span>
        <span class="day-total ${aberto ? 'open' : ''}">${aberto ? '⏳ ' : '⏱️ '}${totalStr}${aberto ? ' (aberto)' : ''}</span>
      </div>`;

    lista.forEach(r => {
      const typeClass = r.tipo === 'entrada' ? 'type-entrada' : 'type-saida';
      const label = r.tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA';
      const manualTag = r.manual ? ' ✏️' : '';
      html += `<div class="punch">
        <div><span class="punch-type ${typeClass}">${label}</span>${r.hora}${manualTag}</div>
        <div class="punch-actions">
          <button class="icon-btn" onclick="excluirRegistro('${r.id||''}', ${r.timestamp})" title="Excluir">🗑️</button>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

function calcularHoras(lista) {
  let totalMs = 0;
  let aberto = false;
  for (let i = 0; i < lista.length; i += 2) {
    const entrada = lista[i];
    const saida = lista[i+1];
    if (entrada && saida && entrada.tipo === 'entrada' && saida.tipo === 'saida') {
      totalMs += saida.timestamp - entrada.timestamp;
    } else {
      aberto = true;
    }
  }
  return { totalMs, aberto };
}

function formatarDuracao(ms) {
  if (ms <= 0) return '0h 0min';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}h ${m}min`;
}

// ========== PDF ==========
function exportarPDF() {
  if (registros.length === 0) { toast('Sem registros para exportar', true); return; }
  const div = document.createElement('div');
  div.style.padding = '20px';
  div.style.color = '#000';
  div.style.background = '#fff';
  div.innerHTML = `<h2>Relatório de Ponto - Rafael Carvalho</h2><p>Gerado em ${new Date().toLocaleString('pt-BR')}</p>`;

  const grupos = {};
  registros.forEach(r => { if (!grupos[r.data]) grupos[r.data]=[]; grupos[r.data].push(r); });
  const datas = Object.keys(grupos).sort((a,b)=>{
    const [da,ma,ya]=a.split('/');const [db,mb,yb]=b.split('/');
    return new Date(ya,ma-1,da)-new Date(yb,mb-1,db);
  });

  datas.forEach(d => {
    const lista = grupos[d].slice().sort((a,b)=>a.timestamp-b.timestamp);
    const { totalMs, aberto } = calcularHoras(lista);
    div.innerHTML += `<h4>${d} — Total: ${formatarDuracao(totalMs)}${aberto?' (aberto)':''}</h4>`;
    div.innerHTML += '<ul>' + lista.map(r =>
      `<li>${r.hora} - ${r.tipo.toUpperCase()}${r.manual?' (manual)':''}</li>`
    ).join('') + '</ul>';
  });

  html2pdf().from(div).set({
    filename: `ponto_rafael_${new Date().toISOString().slice(0,10)}.pdf`,
    margin: 10,
    jsPDF: { unit:'mm', format:'a4' }
  }).save();
}
window.exportarPDF = exportarPDF;
</script>
</body>
</html>
