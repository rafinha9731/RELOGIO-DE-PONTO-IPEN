<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponto Eletrônico - Rafael Carvalho</title>

<!-- html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #f4f6f9; color: #222; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 12px rgba(0,0,0,.08); padding: 24px; }
  h1 { text-align: center; margin-bottom: 6px; color: #1e3a8a; }
  .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
  .status { text-align:center; font-size:12px; margin-bottom:16px; padding:6px; border-radius:6px; }
  .status.online { background:#d1fae5; color:#065f46; }
  .status.offline { background:#fee2e2; color:#991b1b; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; }
  button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: opacity .2s; }
  button:hover { opacity: .9; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: #1e3a8a; color: #fff; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-danger  { background: #dc2626; color: #fff; }
  .btn-warn    { background: #f59e0b; color: #fff; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 14px; }
  th { background: #1e3a8a; color: #fff; }
  tr:nth-child(even) { background: #f9fafb; }
  .empty { text-align:center; padding:20px; color:#888; }
  #relogio { text-align:center; font-size:28px; font-weight:600; color:#1e3a8a; margin-bottom:14px; }

  .section-title { margin: 24px 0 8px; color: #1e3a8a; font-size: 16px; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; }
  .resumo table th { background: #16a34a; }
  .resumo .aberto { color: #b45309; font-style: italic; font-size: 12px; }
  .resumo .total-row td { background: #eef2ff; font-weight: 600; }
</style>
</head>
<body>

<div class="container">
  <h1>Ponto Eletrônico</h1>
  <p class="subtitle">Funcionário: Rafael Carvalho</p>

  <div id="status" class="status offline">Conectando ao Firebase...</div>
  <div id="relogio">--:--:--</div>

  <div class="actions">
    <button class="btn-success" onclick="registrarPonto()">Registrar Ponto</button>
    <button class="btn-primary" onclick="exportarPDF()">Exportar PDF</button>
    <button class="btn-warn" onclick="sincronizar()">Sincronizar</button>
    <button class="btn-danger" onclick="limparRegistros()">Limpar Registros</button>
  </div>

  <h3 class="section-title">Resumo Diário de Horas Trabalhadas</h3>
  <div id="resumoContainer" class="resumo">
    <div class="empty">Nenhum registro para calcular.</div>
  </div>

  <h3 class="section-title">Registros de Ponto</h3>
  <div id="tabelaContainer">
    <div class="empty">Nenhum registro encontrado.</div>
  </div>
</div>

<!-- Firebase SDK modular -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs,
    deleteDoc, doc, query, orderBy, onSnapshot, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDcqSPsYRbLOG--o1QxytP4HXBq9yBO8Jc",
    authDomain: "pontoeletronicorafael.firebaseapp.com",
    projectId: "pontoeletronicorafael",
    storageBucket: "pontoeletronicorafael.firebasestorage.app",
    messagingSenderId: "737764359469",
    appId: "1:737764359469:web:8b2e6c352c948f7f25a7a4",
    measurementId: "G-6ZXKLCBQ00"
  };

  const NOME_COLECAO = "PontoEletronicoRafael";

  let app, db, colRef;
  let firebaseOK = false;

  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    colRef = collection(db, NOME_COLECAO);
    firebaseOK = true;
    setStatus(true, "Conectado ao Firebase");
  } catch (err) {
    console.error("Erro Firebase:", err);
    setStatus(false, "Firebase indisponível - usando armazenamento local");
  }

  function setStatus(ok, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + (ok ? 'online' : 'offline');
    el.textContent = msg;
  }

  // ===== Estado local =====
  const LS_KEY = 'pontos_rafael';

  function lerLocal() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch { return []; }
  }
  function salvarLocal(lista) {
    localStorage.setItem(LS_KEY, JSON.stringify(lista));
  }

  // ===== Formatador de duração =====
  function formatarDuracao(ms) {
    if (ms <= 0) return '00h 00min';
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}min`;
  }

  // ===== Cálculo de horas por dia =====
  function calcularResumoDiario(registros) {
    // Agrupa por data (chave: yyyy-mm-dd)
    const grupos = {};
    registros.forEach(r => {
      const d = new Date(r.timestamp);
      const chave = d.toISOString().slice(0, 10);
      if (!grupos[chave]) grupos[chave] = [];
      grupos[chave].push(r.timestamp);
    });

    // Para cada dia, ordena e pareia
    const resumo = [];
    Object.keys(grupos).sort().forEach(chave => {
      const batidas = grupos[chave].sort((a, b) => a - b);
      let totalMs = 0;
      let aberto = false;

      for (let i = 0; i < batidas.length; i += 2) {
        const entrada = batidas[i];
        const saida = batidas[i + 1];
        if (saida !== undefined) {
          totalMs += (saida - entrada);
        } else {
          aberto = true;
        }
      }

      const [ano, mes, dia] = chave.split('-');
      const dataObj = new Date(Number(ano), Number(mes) - 1, Number(dia));
      resumo.push({
        chave,
        dataFormatada: dataObj.toLocaleDateString('pt-BR'),
        diaSemana: dataObj.toLocaleDateString('pt-BR', { weekday: 'long' }),
        qtdBatidas: batidas.length,
        totalMs,
        aberto
      });
    });

    return resumo;
  }

  function renderResumo(registros) {
    const cont = document.getElementById('resumoContainer');
    if (!registros.length) {
      cont.innerHTML = '<div class="empty">Nenhum registro para calcular.</div>';
      return;
    }

    const resumo = calcularResumoDiario(registros);
    // Mais recente primeiro
    resumo.sort((a, b) => b.chave.localeCompare(a.chave));

    let somaGeral = 0;
    let linhas = '';
    resumo.forEach(r => {
      somaGeral += r.totalMs;
      linhas += `<tr>
        <td>${r.dataFormatada}</td>
        <td style="text-transform:capitalize;">${r.diaSemana}</td>
        <td>${r.qtdBatidas}</td>
        <td>${formatarDuracao(r.totalMs)}${r.aberto ? ' <span class="aberto">(ponto em aberto)</span>' : ''}</td>
      </tr>`;
    });

    cont.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Dia da Semana</th>
            <th>Batidas</th>
            <th>Horas Trabalhadas</th>
          </tr>
        </thead>
        <tbody>
          ${linhas}
          <tr class="total-row">
            <td colspan="3">Total Geral</td>
            <td>${formatarDuracao(somaGeral)}</td>
          </tr>
        </tbody>
      </table>
    `;
  }

  // ===== Renderização da tabela detalhada =====
  function renderTabela(registros) {
    const cont = document.getElementById('tabelaContainer');
    if (!registros.length) {
      cont.innerHTML = '<div class="empty">Nenhum registro encontrado.</div>';
      renderResumo([]);
      return;
    }

    registros.sort((a, b) => b.timestamp - a.timestamp);

    let html = `<table id="tabelaPontos">
      <thead>
        <tr><th>Data</th><th>Hora</th><th>Dia da Semana</th><th>Ação</th></tr>
      </thead><tbody>`;
    registros.forEach(r => {
      const d = new Date(r.timestamp);
      html += `<tr>
        <td>${d.toLocaleDateString('pt-BR')}</td>
        <td>${d.toLocaleTimeString('pt-BR')}</td>
        <td style="text-transform:capitalize;">${d.toLocaleDateString('pt-BR', { weekday: 'long' })}</td>
        <td><button class="btn-danger" data-id="${r.id || ''}" data-ts="${r.timestamp}" onclick="removerRegistro(this)">Remover</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    cont.innerHTML = html;

    renderResumo(registros);
  }

  // ===== Carregar =====
  async function carregar() {
    if (firebaseOK) {
      try {
        const q = query(colRef, orderBy('timestamp', 'desc'));
        onSnapshot(q, snap => {
          const dados = [];
          snap.forEach(d => {
            const data = d.data();
            dados.push({
              id: d.id,
              timestamp: data.timestamp?.toMillis ? data.timestamp.toMillis() : data.timestamp
            });
          });
          salvarLocal(dados);
          renderTabela(dados);
        }, err => {
          console.error("onSnapshot erro:", err);
          setStatus(false, "Erro ao ouvir Firebase - usando cache local");
          renderTabela(lerLocal());
        });
      } catch (err) {
        console.error(err);
        renderTabela(lerLocal());
      }
    } else {
      renderTabela(lerLocal());
    }
  }

  // ===== Registrar =====
  window.registrarPonto = async function () {
    const agora = Date.now();

    if (firebaseOK) {
      try {
        await addDoc(colRef, { timestamp: Timestamp.fromMillis(agora) });
        return;
      } catch (err) {
        console.error("Falha ao gravar no Firebase, salvando local:", err);
        setStatus(false, "Sem conexão - salvo localmente");
      }
    }
    const lista = lerLocal();
    lista.push({ id: 'local_' + agora, timestamp: agora });
    salvarLocal(lista);
    renderTabela(lista);
  };

  // ===== Remover =====
  window.removerRegistro = async function (btn) {
    if (!confirm('Remover este registro?')) return;
    const id = btn.dataset.id;
    const ts = Number(btn.dataset.ts);

    if (firebaseOK && id && !id.startsWith('local_')) {
      try {
        await deleteDoc(doc(db, NOME_COLECAO, id));
        return;
      } catch (err) {
        console.error("Erro ao remover no Firebase:", err);
      }
    }
    const lista = lerLocal().filter(r => r.timestamp !== ts);
    salvarLocal(lista);
    renderTabela(lista);
  };

  // ===== Limpar todos =====
  window.limparRegistros = async function () {
    if (!confirm('Tem certeza que deseja apagar TODOS os registros?')) return;

    if (firebaseOK) {
      try {
        const snap = await getDocs(colRef);
        const dels = [];
        snap.forEach(d => dels.push(deleteDoc(doc(db, NOME_COLECAO, d.id))));
        await Promise.all(dels);
      } catch (err) {
        console.error("Erro ao limpar Firebase:", err);
      }
    }
    localStorage.removeItem(LS_KEY);
    renderTabela([]);
  };

  // ===== Sincronizar =====
  window.sincronizar = async function () {
    if (!firebaseOK) {
      alert('Firebase indisponível no momento.');
      return;
    }
    const locais = lerLocal().filter(r => (r.id || '').startsWith('local_'));
    if (!locais.length) {
      alert('Nada para sincronizar.');
      return;
    }
    try {
      for (const r of locais) {
        await addDoc(colRef, { timestamp: Timestamp.fromMillis(r.timestamp) });
      }
      const restantes = lerLocal().filter(r => !(r.id || '').startsWith('local_'));
      salvarLocal(restantes);
      alert(`${locais.length} registro(s) sincronizado(s).`);
    } catch (err) {
      console.error(err);
      alert('Falha ao sincronizar: ' + err.message);
    }
  };

  // ===== Exportar PDF (mantido igual - sem alterações no cálculo) =====
  window.exportarPDF = function () {
    const registros = lerLocal();
    if (!registros.length) {
      alert('Não há registros para exportar.');
      return;
    }
    registros.sort((a, b) => a.timestamp - b.timestamp);

    const container = document.createElement('div');
    container.style.padding = '20px';
    container.style.fontFamily = 'Arial, sans-serif';
    container.style.color = '#000';

    const dataGeracao = new Date().toLocaleString('pt-BR');

    let linhas = '';
    registros.forEach(r => {
      const d = new Date(r.timestamp);
      linhas += `<tr>
        <td style="border:1px solid #333;padding:6px;text-align:center;">${d.toLocaleDateString('pt-BR')}</td>
        <td style="border:1px solid #333;padding:6px;text-align:center;">${d.toLocaleTimeString('pt-BR')}</td>
        <td style="border:1px solid #333;padding:6px;text-align:center;text-transform:capitalize;">${d.toLocaleDateString('pt-BR', { weekday: 'long' })}</td>
      </tr>`;
    });

    container.innerHTML = `
      <h2 style="text-align:center;margin-bottom:4px;">Relatório de Ponto Eletrônico</h2>
      <p style="text-align:center;margin-bottom:16px;">Funcionário: <strong>Rafael Carvalho</strong></p>
      <p style="text-align:center;font-size:12px;margin-bottom:16px;">Gerado em: ${dataGeracao}</p>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr>
            <th style="border:1px solid #333;padding:6px;background:#e5e7eb;">Data</th>
            <th style="border:1px solid #333;padding:6px;background:#e5e7eb;">Hora</th>
            <th style="border:1px solid #333;padding:6px;background:#e5e7eb;">Dia da Semana</th>
          </tr>
        </thead>
        <tbody>${linhas}</tbody>
      </table>
      <p style="text-align:center;font-size:11px;margin-top:20px;color:#555;">Total de registros: ${registros.length}</p>
    `;

    const opt = {
      margin: 10,
      filename: `ponto_rafael_${new Date().toISOString().slice(0, 10)}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(container).save();
  };

  // ===== Relógio =====
  setInterval(() => {
    document.getElementById('relogio').textContent = new Date().toLocaleTimeString('pt-BR');
  }, 1000);

  // ===== Inicialização =====
  carregar();
</script>
</body>
</html>
