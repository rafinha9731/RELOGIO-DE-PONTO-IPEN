<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Eletrônico - Rafael Carvalho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-8">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-100 pb-6 gap-4">
            <div>
                <span class="text-xs font-bold uppercase tracking-wider text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md">Funcionário</span>
                <h1 class="text-2xl font-bold text-gray-800 mt-1">Rafael Carvalho</h1>
                <p class="text-sm text-gray-500">Controle de Ponto Individual (Histórico Completo)</p>
            </div>
            <div class="text-left sm:text-right w-full sm:w-auto border-t sm:border-t-0 pt-4 sm:pt-0">
                <div id="live-clock" class="text-3xl font-mono font-bold text-blue-600">00:00:00</div>
                <div id="live-date" class="text-sm text-gray-500 font-medium">Carregando data...</div>
                
                <div class="mt-2 flex flex-wrap gap-2 justify-start sm:justify-end">
                    <div class="text-xs font-semibold text-gray-700 bg-gray-100 px-3 py-1.5 rounded-lg inline-block">
                        ⏱️ Hoje: <span id="horas-hoje" class="font-mono font-bold text-emerald-600">00h 00m</span>
                    </div>
                    <div class="text-xs font-semibold text-gray-700 bg-gray-100 px-3 py-1.5 rounded-lg inline-block">
                        📅 Últimos 30 dias: <span id="horas-30-dias" class="font-mono font-bold text-blue-600">00h 00m</span>
                    </div>
                    <div class="text-xs font-semibold text-gray-700 bg-gray-100 px-3 py-1.5 rounded-lg inline-block">
                        📆 Dias registrados: <span id="total-dias" class="font-mono font-bold text-indigo-600">0 dias</span>
                    </div>
                    <div class="text-xs font-semibold text-gray-700 bg-gray-100 px-3 py-1.5 rounded-lg inline-block">
                        📊 Média diária: <span id="media-horas" class="font-mono font-bold text-purple-600">00h 00m</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <button onclick="registrarPonto('Entrada')" class="flex flex-col items-center justify-center h-40 p-6 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 rounded-2xl transition cursor-pointer group shadow-sm">
                <span class="text-4xl mb-2 group-hover:scale-110 transition">📥</span>
                <span class="text-base font-bold text-emerald-800">Entrada</span>
            </button>
            <button onclick="registrarPonto('Almoço Saída')" class="flex flex-col items-center justify-center h-40 p-6 bg
